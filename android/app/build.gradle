apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.sherif.zid"
    defaultConfig {
        applicationId "com.sherif.zid"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    
    // حل مشكلة الصور والـ GIF بشكل نهائي ومباشر
    implementation("com.facebook.fresco:animated-gif:3.2.0")
    implementation("com.facebook.fresco:fresco:3.2.0")
    implementation("com.facebook.fresco:webpsupport:3.2.0")
    
    implementation "androidx.multidex:multidex:2.0.1"

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation "io.github.react-native-community:jsc-android:2026004.+"
    }
}

// ربط مكتبات Expo
apply from: "../../node_modules/expo/scripts/autolinking.gradle"
useExpoModules()
