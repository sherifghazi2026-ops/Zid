name: Publish OTA Update

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'App.js'
      - 'package.json'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment (Production/Staging)'
        required: true
        default: 'Production'

jobs:
  ota-update:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔐 Setup Revopush
        uses: revopush/revopush-github-action@v1
        with:
          accessKey: ${{ secrets.REVOPUSH_ACCESS_KEY }}

      - name: 🚀 Publish Android Update
        run: |
          if [ "${{ github.event.inputs.target }}" == "Production" ]; then
            revopush release-react Zid android -d Production
          else
            revopush release-react Zid android -d Staging
          fi

      - name: ✅ Update published
        run: |
          echo "🎉 تم نشر التحديث بنجاح!"
          echo "📱 حجم التحديث: أقل من 1MB"
