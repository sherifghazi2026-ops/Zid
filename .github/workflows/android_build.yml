name: Build Zid APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Fix Android Build Files
        run: |
          # 1. حل مشكلة الـ Null في السطر 57 (Fresco)
          sed -i 's/implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")/implementation("com.facebook.fresco:animated-gif:3.2.0")/' android/app/build.gradle
          
          # 2. التأكد من وجود مجلد الـ assets
          mkdir -p android/app/src/main/assets

      - name: Generate React Native Bundle
        run: |
          npx react-native bundle --platform android --dev false --entry-file App.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zid-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
