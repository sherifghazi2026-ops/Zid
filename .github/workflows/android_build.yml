name: Build Zid Diagnostic APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Fix Android Config
        run: |
          # حل مشكلة الفريسكو
          sed -i 's/implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")/implementation("com.facebook.fresco:animated-gif:3.2.0")/' android/app/build.gradle
          # تفعيل خاصية الـ Debugging داخل الـ APK
          sed -i 's/minifyEnabled false/minifyEnabled false\n            debuggable true/' android/app/build.gradle
          mkdir -p android/app/src/main/assets

      - name: Generate Dev Bundle
        run: |
          # توليد Bundle بوضعية التطوير الكاملة
          npx react-native bundle --platform android --dev true --entry-file App.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Diagnostic APK
        uses: actions/upload-artifact@v4
        with:
          name: Zid-Show-Errors-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
