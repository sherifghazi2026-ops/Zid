name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔑 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🔓 Decode .env from secret
        run: |
          echo "${{ secrets.ENV_BASE64 }}" | base64 --decode > .env
          echo "✅ .env file created!"
          echo "📄 First line:"
          head -n 1 .env
          echo "📄 Total lines:"
          wc -l .env

      - name: 🏗️ Prebuild Android project
        run: npx expo prebuild --clean

      - name: 🛠️ Build APK with EAS
        run: eas build -p android --profile preview --non-interactive --local
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📎 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/**/*.apk
            **/*.apk
          retention-days: 30
          if-no-files-found: warn
