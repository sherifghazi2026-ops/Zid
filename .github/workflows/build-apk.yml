name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_APPWRITE_ENDPOINT=${{ secrets.EXPO_PUBLIC_APPWRITE_ENDPOINT }}" >> .env
          echo "EXPO_PUBLIC_APPWRITE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_APPWRITE_PROJECT_ID }}" >> .env
          echo "EXPO_PUBLIC_DATABASE_ID=${{ secrets.EXPO_PUBLIC_DATABASE_ID }}" >> .env
          echo "EXPO_PUBLIC_GROQ_API_KEY=${{ secrets.EXPO_PUBLIC_GROQ_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_IMAGEKIT_PUBLIC_KEY=${{ secrets.EXPO_PUBLIC_IMAGEKIT_PUBLIC_KEY }}" >> .env
          echo "EXPO_PUBLIC_IMAGEKIT_ENDPOINT=${{ secrets.EXPO_PUBLIC_IMAGEKIT_ENDPOINT }}" >> .env
          echo "EXPO_TOKEN=${{ secrets.EXPO_TOKEN }}" >> .env

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK
        run: eas build --platform android --profile preview --local --non-interactive --output=./app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zid-APK
          path: ./app-release.apk
          if-no-files-found: error
          retention-days: 90
